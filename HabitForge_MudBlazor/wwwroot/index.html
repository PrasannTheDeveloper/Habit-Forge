<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>HabitForge</title>
    <base href="/" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="HabitForge_MudBlazor.styles.css" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="animations.css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />

    <style>
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 99999;
            overflow: hidden;
            transition: opacity 0.6s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fills the screen, cropping edges if necessary */
            object-position: center; /* Keeps the center of your logo visible */
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #111;
            color: white;
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>

<body>
    <div id="intro-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="Vedio/introV.mp4" type="video/mp4">
        </video>
    </div>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="loading-container">
            <div class="loader"></div>
            <p>Forging your habits...</p>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="animations.js"></script>

    <script>
        const video = document.getElementById('intro-video');
        const container = document.getElementById('intro-container');

        video.playbackRate = 1.3;

        video.play().catch(error => {
            console.log("Autoplay blocked or failed", error);
        });

        Blazor.start();

        video.onended = function () {
            container.classList.add('hidden');
            setTimeout(() => {
                container.remove();
            }, 600);
        };
        video.onerror = function () {
            container.remove();
        };
    </script>
</body>
</html>
